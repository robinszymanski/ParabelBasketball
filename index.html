<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Parabel Wurf</title>
    <!-- Tailwind CSS für die Benutzeroberfläche -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Math.js für das Parsen und Auswerten der mathematischen Funktionen -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background-color: #1a1a1a; }
        
        /* Das Overlay muss pointer-events: none haben, damit WebXR Touches auf dem Canvas registriert */
        #dom-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10; display: flex; flex-direction: column; justify-content: space-between;
        }
        
        /* Interaktive UI-Elemente müssen pointer-events wieder aktivieren */
        .interactive-ui { pointer-events: auto; }
        
        #ar-button-container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 20;
        }
        
        .hidden { display: none !important; }
        
        /* Fadenkreuz für das Platzieren */
        #reticle-ui {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 40px; height: 40px; border: 2px solid white; border-radius: 50%;
            pointer-events: none; opacity: 0.7;
        }
        #reticle-dot {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 4px; height: 4px; background: white; border-radius: 50%;
        }
    </style>
</head>
<body>

    <!-- Container für den WebXR AR-Button vor dem Start -->
    <div id="ar-button-container" class="text-center">
        <h1 class="text-3xl text-white font-bold mb-4">AR Steckbriefaufgaben</h1>
        <p class="text-gray-300 mb-6 max-w-md mx-auto">Modelliere die Flugbahn eines Basketballs mit quadratischen Funktionen. Nutze dazu Augmented Reality.</p>
        <!-- ARButton wird hier per JS eingefügt -->
    </div>

    <!-- DOM Overlay, das in der AR-Ansicht über dem Kamerabild liegt -->
    <div id="dom-overlay" class="hidden">
        
        <!-- Obere Leiste: Status und Anweisungen -->
        <div id="status-bar" class="w-full bg-black/60 text-white text-center p-3 font-semibold backdrop-blur-sm">
            Scanne den Boden und tippe auf den Bildschirm, um das Feld zu platzieren.
        </div>

        <!-- Fadenkreuz zum Platzieren (nur am Anfang sichtbar) -->
        <div id="reticle-ui">
            <div id="reticle-dot"></div>
        </div>

        <!-- Haupt-UI (Aufgabe & Eingabe), erst nach Platzierung sichtbar -->
        <div id="task-ui" class="hidden interactive-ui w-full max-w-md mx-auto bg-white/95 rounded-t-2xl shadow-2xl p-5 pb-8 backdrop-blur-md">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-gray-800">Finde die Funktion!</h2>
                <button id="btn-next" class="hidden bg-blue-500 text-white px-3 py-1 rounded-lg text-sm font-bold shadow hover:bg-blue-600 transition">Neue Aufgabe</button>
            </div>
            
            <div class="bg-gray-100 rounded-lg p-3 mb-4 text-sm text-gray-700 shadow-inner">
                <p><strong>Abwurfpunkt:</strong> <span id="lbl-abwurf" class="font-mono text-blue-600">P1(0 | 2)</span></p>
                <p><strong>Korb:</strong> <span id="lbl-korb" class="font-mono text-green-600">P2(4 | 2)</span></p>
                
                <div id="vertex-container" class="mt-2">
                    <button id="btn-show-vertex" class="text-xs bg-gray-200 hover:bg-gray-300 text-gray-700 px-2 py-1 rounded border border-gray-300 transition">
                        Tipp: Scheitelpunkt anzeigen
                    </button>
                    <p id="lbl-scheitelpunkt" class="hidden font-mono text-purple-600 mt-1">S(2 | 4)</p>
                </div>
            </div>

            <div class="mb-4">
                <label class="block text-sm font-bold text-gray-700 mb-2">Funktionsgleichung f(x) =</label>
                <div class="flex gap-2 mb-2">
                    <!-- Hilfstasten für schnellere Eingabe auf mobilen Geräten -->
                    <button class="helper-btn bg-gray-200 text-gray-800 px-3 py-1 rounded font-mono shadow-sm" data-val="x">x</button>
                    <button class="helper-btn bg-gray-200 text-gray-800 px-3 py-1 rounded font-mono shadow-sm" data-val="^2">x²</button>
                    <button class="helper-btn bg-gray-200 text-gray-800 px-3 py-1 rounded font-mono shadow-sm" data-val="(">(</button>
                    <button class="helper-btn bg-gray-200 text-gray-800 px-3 py-1 rounded font-mono shadow-sm" data-val=")">)</button>
                </div>
                <input type="text" id="input-funktion" placeholder="-0.5*(x-2)^2 + 4" class="w-full border-2 border-gray-300 rounded-lg p-3 font-mono text-lg focus:border-blue-500 focus:outline-none">
            </div>

            <button id="btn-throw" class="w-full bg-orange-500 text-white font-bold py-3 rounded-lg text-lg shadow-lg hover:bg-orange-600 active:scale-95 transition-transform">
                🏀 Werfen!
            </button>

            <!-- Feedback Nachrichten -->
            <div id="feedback-msg" class="hidden mt-4 text-center font-bold p-2 rounded-lg"></div>
        </div>

    </div>

    <!-- Three.js und WebXR Imports -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';

        // Globale Variablen
        let container, camera, scene, renderer;
        let controller, reticle;
        let hitTestSource = null;
        let hitTestSourceRequested = false;
        
        let baseGroup; // Container für alles, was im Raum platziert wird
        let isPlaced = false;

        // Spiel-Status Variablen
        let currentTask = {};
        let ballMesh;
        let drawnLine = null;
        let isAnimating = false;
        let animTime = 0;
        let animUserFunc = null;

        // Skalierungsfaktor: 1 Längeneinheit im Mathe-System = 0.2 Meter in der echten Welt
        const SCALE = 0.2; 

        // Pool an Aufgaben mit "schönen" Zahlen
        const taskPool = [
            { a: -0.5, xs: 2, ys: 4 },
            { a: -0.25, xs: 4, ys: 5 },
            { a: -1, xs: 2, ys: 5 },
            { a: -0.5, xs: 3, ys: 5 },
            { a: -0.2, xs: 5, ys: 6 }
        ];

        init();
        animate();

        function init() {
            container = document.createElement('div');
            document.body.appendChild(container);

            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
            light.position.set(0.5, 1, 0.25);
            scene.add(light);
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
            dirLight.position.set(0, 5, 0);
            scene.add(dirLight);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            container.appendChild(renderer.domElement);

            // Base Group (wird beim Platzieren positioniert)
            baseGroup = new THREE.Group();
            // Die Mathe-Ebene ist XY. Standardmäßig schauen wir in -Z Richtung.
            // Die BaseGroup bleibt so, XY ist aufrechtstehend vor uns.
            scene.add(baseGroup);
            baseGroup.visible = false;

            // AR Button erstellen, fordert Hit-Test und DOM-Overlay an
            const arBtnOptions = {
                requiredFeatures: ['hit-test', 'dom-overlay'],
                domOverlay: { root: document.getElementById('dom-overlay') }
            };
            const arButton = ARButton.createButton(renderer, arBtnOptions);
            document.getElementById('ar-button-container').appendChild(arButton);

            arButton.addEventListener('click', () => {
                document.getElementById('ar-button-container').classList.add('hidden');
                document.getElementById('dom-overlay').classList.remove('hidden');
            });

            // Controller / Tipp-Events in AR
            controller = renderer.xr.getController(0);
            controller.addEventListener('select', onSelect);
            scene.add(controller);

            // Reticle (Fadenkreuz) für AR Platzierung
            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.15, 0.2, 32).rotateX(- Math.PI / 2),
                new THREE.MeshBasicMaterial({ color: 0x00ff00 })
            );
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            window.addEventListener('resize', onWindowResize);
            
            setupUI();
        }

        function setupUI() {
            // Helper Buttons
            document.querySelectorAll('.helper-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const input = document.getElementById('input-funktion');
                    const val = e.target.getAttribute('data-val');
                    input.value += val;
                    input.focus();
                });
            });

            // Scheitelpunkt anzeigen Button
            document.getElementById('btn-show-vertex').addEventListener('click', () => {
                document.getElementById('lbl-scheitelpunkt').classList.remove('hidden');
                document.getElementById('btn-show-vertex').classList.add('hidden');
            });

            // Werfen Button
            document.getElementById('btn-throw').addEventListener('click', () => {
                evaluateThrow();
            });

            // Nächste Aufgabe Button
            document.getElementById('btn-next').addEventListener('click', () => {
                generateTask();
                document.getElementById('btn-next').classList.add('hidden');
                document.getElementById('feedback-msg').classList.add('hidden');
                document.getElementById('input-funktion').value = '';
                document.getElementById('lbl-scheitelpunkt').classList.add('hidden');
                document.getElementById('btn-show-vertex').classList.remove('hidden');
                if(drawnLine) {
                    baseGroup.remove(drawnLine);
                    drawnLine = null;
                }
            });
        }

        function onSelect() {
            // Wenn schon platziert, wird ein Select-Event für Hit-Test ignoriert
            if (isPlaced) return;

            if (reticle.visible) {
                // Setze BaseGroup an Position des Fadenkreuzes
                baseGroup.position.setFromMatrixPosition(reticle.matrix);
                // Rotiere die BaseGroup, sodass sie in Richtung der Kamera schaut
                const euler = new THREE.Euler().setFromQuaternion(camera.quaternion);
                baseGroup.rotation.y = euler.y;

                baseGroup.visible = true;
                isPlaced = true;
                
                // UI umschalten
                document.getElementById('reticle-ui').style.display = 'none';
                document.getElementById('status-bar').innerText = "Berechne die Flugbahn!";
                document.getElementById('task-ui').classList.remove('hidden');

                generateTask();
            }
        }

        function generateTask() {
            // Wähle eine zufällige Aufgabe aus dem Pool
            const taskParams = taskPool[Math.floor(Math.random() * taskPool.length)];
            currentTask.a = taskParams.a;
            currentTask.xs = taskParams.xs;
            currentTask.ys = taskParams.ys;
            
            // Abwurf bei x=0
            currentTask.x0 = 0;
            currentTask.y0 = currentTask.a * Math.pow((currentTask.x0 - currentTask.xs), 2) + currentTask.ys;

            // Korb bei symmetrischem Punkt x = 2*xs
            currentTask.xb = currentTask.xs * 2;
            currentTask.yb = currentTask.a * Math.pow((currentTask.xb - currentTask.xs), 2) + currentTask.ys;

            // UI Aktualisieren
            document.getElementById('lbl-abwurf').innerText = `P1(${currentTask.x0} | ${currentTask.y0})`;
            document.getElementById('lbl-korb').innerText = `P2(${currentTask.xb} | ${currentTask.yb})`;
            document.getElementById('lbl-scheitelpunkt').innerText = `S(${currentTask.xs} | ${currentTask.ys})`;

            build3DScene();
        }

        function build3DScene() {
            // Alte Elemente entfernen (außer evtl. Achsen, aber wir machen es hier einfach)
            while(baseGroup.children.length > 0){ 
                baseGroup.remove(baseGroup.children[0]); 
            }
            drawnLine = null;

            // Hilfsfunktion: Konvertiert Mathe-Einheiten in 3D-Koordinaten
            const to3D = (x, y) => new THREE.Vector3(x * SCALE, y * SCALE, 0);

            // 1. Koordinatensystem Achsen zeichnen
            const axesMaterial = new THREE.LineBasicMaterial({ color: 0x888888 });
            const axesPoints = [];
            // X-Achse
            axesPoints.push(to3D(-1, 0));
            axesPoints.push(to3D(currentTask.xb + 2, 0));
            // Y-Achse
            axesPoints.push(to3D(0, 0)); // Von Ursprung
            axesPoints.push(to3D(0, currentTask.ys + 1));
            
            const axesGeo = new THREE.BufferGeometry().setFromPoints(axesPoints);
            baseGroup.add(new THREE.LineSegments(axesGeo, axesMaterial));

            // 2. Abwurf-Sockel (Spieler)
            const pHeight = currentTask.y0 * SCALE;
            const playerGeo = new THREE.CylinderGeometry(0.05, 0.05, pHeight, 16);
            const playerMat = new THREE.MeshLambertMaterial({ color: 0x3b82f6 }); // Blau
            const player = new THREE.Mesh(playerGeo, playerMat);
            player.position.set(0, pHeight / 2, 0);
            baseGroup.add(player);

            // 3. Korb
            const kHeight = currentTask.yb * SCALE;
            const poleGeo = new THREE.CylinderGeometry(0.02, 0.02, kHeight, 8);
            const poleMat = new THREE.MeshLambertMaterial({ color: 0x555555 });
            const pole = new THREE.Mesh(poleGeo, poleMat);
            pole.position.set(currentTask.xb * SCALE, kHeight / 2, 0);
            baseGroup.add(pole);

            const ringGeo = new THREE.TorusGeometry(0.08, 0.015, 8, 24);
            const ringMat = new THREE.MeshLambertMaterial({ color: 0xef4444 }); // Rot
            const ring = new THREE.Mesh(ringGeo, ringMat);
            // Ring flach hinlegen
            ring.rotation.x = Math.PI / 2; 
            ring.position.set(currentTask.xb * SCALE, kHeight, 0);
            baseGroup.add(ring);

            // 4. Basketball (Initiale Position auf Abwurfpunkt)
            const ballGeo = new THREE.SphereGeometry(0.06, 16, 16);
            const ballMat = new THREE.MeshLambertMaterial({ color: 0xf97316 }); // Orange
            ballMesh = new THREE.Mesh(ballGeo, ballMat);
            ballMesh.position.copy(to3D(currentTask.x0, currentTask.y0));
            baseGroup.add(ballMesh);
        }

        function evaluateThrow() {
            if (isAnimating) return; // Nichts tun, wenn schon animiert wird

            let rawInput = document.getElementById('input-funktion').value;
            // Deutsches Komma durch Punkt ersetzen, falls vorhanden
            rawInput = rawInput.replace(/,/g, '.');

            let compiledFunc;
            try {
                // Parse und kompiliere mit math.js
                compiledFunc = math.compile(rawInput);
                
                // Teste ob die Funktion funktioniert
                compiledFunc.evaluate({x: 0});
            } catch (e) {
                showFeedback("Ungültige Eingabe! Bitte überprüfe die Schreibweise.", false);
                return;
            }

            // Werte evaluieren
            const val0 = compiledFunc.evaluate({x: 0});
            const valB = compiledFunc.evaluate({x: currentTask.xb});
            const valS = compiledFunc.evaluate({x: currentTask.xs});

            // Toleranz für die Überprüfung
            const tol = 0.1;
            const isCorrect = (Math.abs(val0 - currentTask.y0) < tol) &&
                              (Math.abs(valB - currentTask.yb) < tol) &&
                              (Math.abs(valS - currentTask.ys) < tol);

            if (drawnLine) {
                baseGroup.remove(drawnLine);
            }

            if (isCorrect) {
                showFeedback("Treffer! Perfekte Flugbahn.", true);
                startAnimation(compiledFunc);
            } else {
                showFeedback("Leider daneben. Die Flugbahn sieht so aus:", false);
                drawTrajectory(compiledFunc, 0xff0000); // Rote Linie für Fehler
            }
        }

        function showFeedback(msg, success) {
            const fbBox = document.getElementById('feedback-msg');
            fbBox.innerText = msg;
            fbBox.classList.remove('hidden', 'bg-green-100', 'text-green-800', 'bg-red-100', 'text-red-800');
            
            if (success) {
                fbBox.classList.add('bg-green-100', 'text-green-800');
                document.getElementById('btn-next').classList.remove('hidden');
            } else {
                fbBox.classList.add('bg-red-100', 'text-red-800');
            }
        }

        function drawTrajectory(func, colorHex) {
            const points = [];
            // Zeichne von x=0 bis etwas hinter den Korb
            for (let x = 0; x <= currentTask.xb + 1; x += 0.1) {
                try {
                    let y = func.evaluate({x: x});
                    if (y < -2) break; // Nicht zu weit in den Boden zeichnen
                    points.push(new THREE.Vector3(x * SCALE, y * SCALE, 0));
                } catch(e) { break; }
            }
            
            // TubeGeometry erzeugt eine sichtbare, dicke Linie in AR
            const curve = new THREE.CatmullRomCurve3(points);
            const tubeGeo = new THREE.TubeGeometry(curve, points.length * 2, 0.01, 8, false);
            const tubeMat = new THREE.MeshBasicMaterial({ color: colorHex });
            drawnLine = new THREE.Mesh(tubeGeo, tubeMat);
            baseGroup.add(drawnLine);
        }

        function startAnimation(func) {
            animUserFunc = func;
            animTime = 0; // x-Koordinate der Animation
            isAnimating = true;
            // Grüne Linie einzeichnen zur Visualisierung
            drawTrajectory(func, 0x22c55e); 
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            renderer.setAnimationLoop(render);
        }

        function render(timestamp, frame) {
            if (frame) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();

                // Hit Testing initialisieren, falls noch nicht passiert
                if (hitTestSourceRequested === false) {
                    session.requestReferenceSpace('viewer').then(function (referenceSpace) {
                        session.requestHitTestSource({ space: referenceSpace }).then(function (source) {
                            hitTestSource = source;
                        });
                    });
                    session.addEventListener('end', function () {
                        hitTestSourceRequested = false;
                        hitTestSource = null;
                        isPlaced = false;
                    });
                    hitTestSourceRequested = true;
                }

                // Fadenkreuz aktualisieren (nur wenn noch nicht platziert)
                if (hitTestSource && !isPlaced) {
                    const hitTestResults = frame.getHitTestResults(hitTestSource);
                    if (hitTestResults.length > 0) {
                        const hit = hitTestResults[0];
                        reticle.visible = true;
                        reticle.matrix.fromArray(hit.getPose(referenceSpace).transform.matrix);
                    } else {
                        reticle.visible = false;
                    }
                }
            }

            // Animation des Balls, falls aktiv
            if (isAnimating && animUserFunc) {
                animTime += 0.05; // Geschwindigkeit der Animation
                if (animTime > currentTask.xb) {
                    animTime = currentTask.xb;
                    isAnimating = false; // Stop am Korb
                }
                
                try {
                    let currentY = animUserFunc.evaluate({x: animTime});
                    ballMesh.position.set(animTime * SCALE, currentY * SCALE, 0);
                } catch(e) {
                    isAnimating = false; // Abbruch bei Rechenfehler
                }
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
